<!DOCTYPE html>
<html>

<head>
    <title>Student App</title>
</head>

<body>

    <h1>Student Form</h1>

    <input type="text" id="name" placeholder="Enter Name">

    <input type="number" id="age" placeholder="Enter Age">

    <button onclick="addStudent()">
        Add Student
    </button>

    <button onclick="getStudents()">
        Get Students
    </button>

    <hr>

    <table border="1">

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <tbody id="tbody"></tbody>

    </table>


    <script>

        // ADD STUDENT
        function addStudent() {

            let name = document.getElementById("name").value;

            let age = document.getElementById("age").value;


            fetch("/students", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    name: name,
                    age: age
                })

            })

            .then(res => res.json())

            .then(data => {

                alert(data.message);

            });

        }



        // GET STUDENTS
        function getStudents() {

            fetch("/students")

            .then(res => res.json())

            .then(data => {

                let rows = "";

                data.forEach(student => {

                    rows += `
                        <tr>
                            <td>${student.name}</td>
                            <td>${student.age}</td>
                        </tr>
                    `;

                });

                document.getElementById("tbody").innerHTML = rows;

            });

        }

    </script>

</body>

</html>
