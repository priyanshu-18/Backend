<!DOCTYPE html>
<html>

<head>
    <title>Get Students</title>
</head>

<body>

    <h1>Students List</h1>

    <button id="btn">
        Get Students
    </button>

    <table border="1">

        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <tbody id="tbody">

        </tbody>

    </table>



    <script>

        // Button Click
        document.getElementById("btn").addEventListener("click", () => {

            // Fetch API
            fetch("/students")

            .then(res => res.json())

            .then(data => {

                let rows = "";

                // Loop through data
                data.forEach(student => {

                    rows += `
                        <tr>
                            <td>${student.name}</td>
                            <td>${student.age}</td>
                        </tr>
                    `;

                });

                // Display data
                document.getElementById("tbody").innerHTML = rows;

            });

        });

    </script>

</body>

</html>
